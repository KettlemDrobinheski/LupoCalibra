<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div id="painel-configuracao" class="ihm-container">
    <h3>⚙️ Painel de Regulagem (IHM)</h3>
    <div class="ihm-controles">
        <label for="pesoAlvoInput">Definir Peso Alvo (g): </label>
        <input type="number" id="pesoAlvoInput" value="150" class="ihm-input">
        <button id="btnSalvarConfig" class="ihm-botao">
            Aplicar Regulagem
        </button>
    </div>

        <div>
            <h1>LINHA DE EMBALAGEM BL EXPORT</h1>
            <p class="subtitle">Sistema de Integridade do Desviador de Alta Velocidade</p>
        </div>
        <div id="systemStatusLabel" class="system-status status-running">System OK</div>
    </header>

    <main class="grid-container" id="binsGrid"></main>

    <footer>
        <button id="resetBtn" class="btn-reset" onclick="resetSystem()">RESET INTERLOCK & RESTART LINE</button>
    </footer>

    <div id="modalRegulagem" class="modal-oculto">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="fecharRegulagemCuba()">&times;</span>
            <h3>⚙️ Ajuste Fino - <span id="nomeCubaSelecionada">Cuba XX</span></h3>
            <hr>
            
            <div class="modal-campo">
                <label for="pesoAlvoCuba">Peso Alvo da Cuba (g):</label>
                <input type="number" id="pesoAlvoCuba" class="ihm-input" value="150">
            </div>
            
            <div class="modal-campo">
                <label for="toleranciaCuba">Tolerância Aceitável (%):</label>
                <input type="number" id="toleranciaCuba" class="ihm-input" value="10">
            </div>

            <button id="btnSalvarCuba" class="ihm-botao" style="margin-top: 15px; width: 100%;">
                Salvar Ajuste na Nuvem
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
