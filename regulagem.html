<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulagem da Cuba - IHM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-regulagem">

    <div class="setup-card">
        
        <h2 class="setup-titulo">⚙️ Central de Regulagem Geral</h2>
        <p class="setup-subtitulo">Ajuste de parâmetros das Balanças (BLs)</p>
        <hr class="setup-divisor">

        <div class="setup-campo">
            <label for="selecaoCuba">Selecione a Balança (BL):</label>
            <select id="selecaoCuba" class="ihm-input select-industrial">
                <optgroup label="LADO ESQUERDO (Calha A)">
                    <option value="cuba_1_L">BL 1 - Esquerda</option>
                    <option value="cuba_2_L">BL 2 - Esquerda</option>
                    <option value="cuba_3_L">BL 3 - Esquerda</option>
                    <option value="cuba_4_L">BL 4 - Esquerda</option>
                    <option value="cuba_5_L">BL 5 - Esquerda</option>
                    <option value="cuba_6_L">BL 6 - Esquerda</option>
                    <option value="cuba_7_L">BL 7 - Esquerda</option>
                    <option value="cuba_8_L">BL 8 - Esquerda</option>
                </optgroup>
                <optgroup label="LADO DIREITO (Calha B)">
                    <option value="cuba_1_R">BL 1 - Direita</option>
                    <option value="cuba_2_R">BL 2 - Direita</option>
                    <option value="cuba_3_R">BL 3 - Direita</option>
                    <option value="cuba_4_R">BL 4 - Direita</option>
                    <option value="cuba_5_R">BL 5 - Direita</option>
                    <option value="cuba_6_R">BL 6 - Direita</option>
                    <option value="cuba_7_R">BL 7 - Direita</option>
                    <option value="cuba_8_R">BL 8 - Direita</option>
                </optgroup>
            </select>
            </div>

        <div class="setup-campo">
            <label for="pesoAlvoCuba">Peso Alvo da Peça (g):</label>
            <input type="number" id="pesoAlvoCuba" class="ihm-input" value="150">
        </div>

        <div class="setup-campo">
            <label for="toleranciaCuba">Tolerância Aceitável (%):</label>
            <input type="number" id="toleranciaCuba" class="ihm-input" value="10">
        </div>

        <button id="btnSalvarConfigCuba" class="ihm-botao btn-bloco">
            ⚡ Aplicar e Salvar na Nuvem
        </button>

        <button onclick="window.location.href='index.html'" class="btn-voltar btn-bloco">
            ⬅️ Voltar para o Painel Principal
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="regulagem.js"></script>
</body>
</html>
